            h, i = this.grid,
            p = i.lastEdit,
            j = i.activeEditor,
            b = l.shiftKey,
            o, p, a, m;
        if (d == l.TAB) {
            l.stopEvent();
            if (j){
                j.completeEdit();
            if (b) {
                h = i.walkCells(j.row, j.col - 1, -1, this.acceptsNav, this)
            } else {
                h = i.walkCells(j.row, j.col + 1, 1, this.acceptsNav, this)
            }
            }

        } else {
            if (d == l.ENTER) {
                if (this.moveEditorOnEnter !== false) {
                    if (b) {
                        h = i.walkCells(p.row - 1, p.col, -1, this.acceptsNav, this)
                    } else {
                        h = i.walkCells(p.row + 1, p.col, 1, this.acceptsNav, this)
                    }
                }
            }
        }
        if (h) {
            a = h[0];
            m = h[1];

            if (i.isEditor && i.editing) {
                o = i.activeEditor;
                if (o && o.field.triggerBlur) {
                    //console.log(o.field);
                }
            }
            this.onEditorSelect(a, p.row);
            i.startEditing(a, m)
        }

    ,loadData: function(){
        var items_string = Ext.get('tv83').dom.value;
        var items = [];
        var item = {};
        try {
            items = Ext.util.JSON.decode(items_string);
        }
        catch (e){
        }

        if (items.length == 0){
            Ext.get('tv83').dom.value = '';
        }

        this.autoinc = 0;
        for(i = 0; i <  items.length; i++) {
 		    item = items[i];
            if (item.MIGX_id){
                if (parseInt(item.MIGX_id)  > this.autoinc){
                    this.autoinc = item.MIGX_id;
                }
            }else{
                item.MIGX_id = this.autoinc +1 ;
                this.autoinc = item.MIGX_id;
            }
           items[i] = item;
        }

        this.getStore().sortInfo = null;
        this.getStore().loadData(items);



        //this.syncSize();
        //this.setWidth('100%');
    }

    ,getSelectedAsList: function() {
        var sels = this.getSelectionModel().getSelections();
        if (sels.length <= 0) return false;

        var cs = '';
        for (var i=0;i<sels.length;i++) {
            cs += ','+sels[i].data.id;
        }
        cs = Ext.util.Format.substr(cs,1,cs.length-1);
        return cs;
    }
    ,addItem: function(btn,e) {
        var maxRecords =  parseInt('');
        var add_items_directly = '';
        var s=this.getStore();
        if(maxRecords != 0 && s.getCount() >= maxRecords){
            alert ('Max amount of records reached');
            return;
        }
        if (add_items_directly == '1'){
            this.addNewItem();
        }else{
            this.loadWin(btn,e,s.getCount(),'a');
        }
    }
    ,addNewItem: function(olditem){
            if (olditem){
                var json = '[' + Ext.util.JSON.encode(olditem) + ']';
                var items=Ext.util.JSON.decode(json);
            }else{
                var items = [{"day_number":"","en_daytitle":"","web_daytitle":"","sv_daytitle":""}];
            }

            var item = items[0];
            var s = this.getStore();
            var addNewItemAt = 'bottom';

            this.autoinc = parseInt(this.autoinc) +1;
            s.loadData(items,true);
            idx=s.getCount()-1;
            var rec = s.getAt(idx);
            rec.set('MIGX_id',this.autoinc);
            item['MIGX_id'] = this.autoinc;
            rec.json = item;

            if (addNewItemAt == 'top'){
                s.insert(0,rec);
            }
            this.getView().refresh();

            var call_collectmigxitems = this.call_collectmigxitems;
            this.call_collectmigxitems=true;
            this.collectItems();
            this.call_collectmigxitems = call_collectmigxitems;
    }
    ,preview: function(btn,e) {
        var s=this.getStore();
        this.loadPreviewWin(btn,e,s.getCount(),'a');
    }
    ,migx_remove: function() {
        var _this=this;
        Ext.Msg.confirm(_('warning') || '','Remove Item?' || '',function(e) {
            if (e == 'yes') {

        var sels = _this.getSelectionModel().getSelections();
        if (sels.length <= 0) return false;
        for (var i=0;i<sels.length;i++) {
            var id = sels[i].id;
            var index = _this.getStore().findBy(function(record){if(record.id == id){return true;}});
            _this.getStore().removeAt(index);
        }

                _this.getView().refresh();
                _this.collectItems();
                MODx.fireResourceFormChange();
               }
            }),this;
    }
    ,refresh: function() {
        return;
    }
    ,migx_update: function(btn,e) {
      this.loadWin(btn,e,this.menu.recordIndex,'u');
    }
    ,migx_duplicate: function(btn,e) {
        var add_items_directly = '';
        if (add_items_directly == '1'){
            var s=this.getStore();
            var rec = s.getAt(this.menu.recordIndex);
            this.addNewItem(rec.json);
        }else{
            this.loadWin(btn,e,this.menu.recordIndex,'d');
        }


    }

    ,loadFromSource: function(btn,e,extra_params) {

        var recordIndex = 'none';
        if (this.menu.recordIndex == 0){
            recordIndex = 0;
        }else{
            recordIndex = this.menu.recordIndex || 'none';
        }

        var extra_params = extra_params || '';
        MODx.Ajax.request({
            url: '/assets/components/migx/connector.php'
            ,params: {
                action: 'mgr/loadfromsource'
                ,resource_id: '229'
                ,co_id: ''
                ,tv_name: 'ncb_migx_trip_day_by_day'
                ,items: Ext.get('tv83').dom.value
                ,record_index: recordIndex
                ,extra_params: extra_params
                ,reqConfigs: ''
                ,source: '1'
            }
            ,listeners: {
                'success': {fn:function(res){
                    if (res.message==''){
                        var items = res.object;
                        var item = null;
                        Ext.get('tv83').dom.value = Ext.util.JSON.encode(items);
                        this.autoinc = 0;
                        for(i = 0; i <  items.length; i++) {
 		                    item = items[i];
                            if (item.MIGX_id){

                                if (parseInt(item.MIGX_id)  > this.autoinc){
                                    this.autoinc = item.MIGX_id;
                                }
                            }else{
                                item.MIGX_id = this.autoinc +1 ;
                                this.autoinc = item.MIGX_id;
                            }
                            items[i] = item;
                        }

                        this.getStore().sortInfo = null;
                        this.getStore().loadData(items);
                        var call_collectmigxitems = this.call_collectmigxitems;
                        this.call_collectmigxitems=true;
                        this.collectItems();
                        this.call_collectmigxitems = call_collectmigxitems;
                    }

                },scope:this}
            }
        });
    }

        for (var i=0;i<sels.length;i++) {

        this.getView().refresh();
        this.collectItems();

        }

        this.collectItems();
        MODx.fireResourceFormChange();

                        this.autoinc = 0;
                        for(i = 0; i <  items.length; i++) {

                        this.getStore().loadData(items);

        });

                tvid = (fields[i].tv_id);

        this.hideOnSubmit=true;
        this.saveDeepOnSubmit = false;
        this.doSubmit();
    },
    submitUnclosed:function(btn,event,from_child_window) {
        var from_child = from_child_window || false;
        this.saveDeepOnSubmit = true;
        if (this.action == 'u' || this.action == 'export_import_migxitem'){
            this.hideOnSubmit=false;    
        } else {
            this.hideOnSubmit=true;//close in any case, if a new item!
        }
        if (from_child){
            this.hideOnSubmit=false;//dont hide, if called from child window
            if (this.action == 'u' || this.action == 'export_import_migxitem'){
                    
            } else {
                return;//dont save, if called from child and if a new item!
            }                
        }
        
        this.doSubmit();
    },  
    doSubmit: function() {
        var v = this.fp.getForm().getValues();
        var object_id = this.baseParams.object_id;
        var fields = Ext.util.JSON.decode(v['mulititems_grid_item_fields']);
        var item = {};
        var tvid = '';
        var tvids = {};
        var addNewItemAt = '';
        //we run onBeforeSubmit on each field, if this function exists. For example for richtext-fields.
        if (fields.length>0){
            for (var i = 0; i < fields.length; i++) {
                tvid = (fields[i].tv_id);
                field = Ext.get('tv'+tvid);
                tvids[fields[i].field] = tvid;
                if (field && typeof(field.onBeforeSubmit) != 'undefined'){
                    field.onBeforeSubmit();
                }
            }
        }

        v = this.fp.getForm().getValues();
        fields = Ext.util.JSON.decode(v['mulititems_grid_item_fields']);

        if (this.fp.getForm().isValid()) {
            var s = this.grid.getStore();

            if (this.action == 'd'){
                MODx.fireResourceFormChange();
            }
            if (this.action == 'e'){
                tvid = tvids['jsonexport'];
                //console.log(v['tv'+tvid]);
                Ext.get('tv83').dom.value = v['tv'+tvid];
                this.grid.loadData();

            }else{
                if (this.action == 'u' || this.action == 'export_import_migxitem'){
                    var idx = this.baseParams.itemid;
                }else{
                    /*append record*/
                    var addNewItemAt = 'bottom';
                    var items=Ext.util.JSON.decode('[{"day_number":"","en_daytitle":"","web_daytitle":"","sv_daytitle":""}]');
                    s.loadData(items,true);

                    idx=s.getCount()-1;
                    this.grid.autoinc = v['tvmigxid'];
                }

                var rec = s.getAt(idx);
                if (this.action == 'export_import_migxitem'){
                    var jsonexport = '';
                    var jsonobject = {};
                    if (fields.length>0){
                        for (var i = 0; i < fields.length; i++) {
                            tvid = (fields[i].tv_id);
                            if(fields[i].field == 'MIGX_id'){
                                item[fields[i].field]=v['tv'+tvid+'[]'] || v['tv'+tvid] || '';
                                //set defined record-fields to its new value
                                rec.set(fields[i].field,item[fields[i].field])
                            }
                            if(fields[i].field == 'jsonexport'){
                                jsonexport = v['tv'+tvid+'[]'] || v['tv'+tvid] || '';
                                try {
                                    jsonobject = JSON.parse(jsonexport);
                                } catch (e) {
                                    
                                }
                                if (typeof jsonobject === 'object'){
                                    const keys = Object.keys(jsonobject);
                                    keys.forEach((key, index) => {
                                        if (key != 'MIGX_id'){
                                            item[key] = jsonobject[key];
                                            rec.set(key,jsonobject[key]);
                                        }
                                    });
                                }
                            }  
                        }
                        //we store the item.values to rec.json because perhaps sometimes we can have different fields for each record
                        rec.json=item;
                    }             
                } else { 
                    if (fields.length>0){
                        for (var i = 0; i < fields.length; i++) {
                            tvid = (fields[i].tv_id);
                            if (v['tv'+tvid+'_prefix']) v['tv'+tvid]=v['tv'+tvid+'_prefix']+v['tv'+tvid];//url-TV support
                            item[fields[i].field]=v['tv'+tvid+'[]'] || v['tv'+tvid] || '';
                            //set defined record-fields to its new value
                            rec.set(fields[i].field,item[fields[i].field])
                        }
                        //we store the item.values to rec.json because perhaps sometimes we can have different fields for each record
                        rec.json=item;
                    }
                }
                if (addNewItemAt == 'top'){
                    s.insert(0,rec);
                }

                this.grid.getView().refresh();
                this.grid.collectItems();
                //this.onDirty();

            }

            if (this.fireEvent('success',v)) {
                this.fp.getForm().reset();
                if (this.hideOnSubmit){
                    this.hide();
                } 
                if (this.saveDeepOnSubmit){
                    if (this.parent_window){
                        var parent_window = Ext.getCmp(this.parent_window);
                        if (typeof(parent_window.submitUnclosed) != 'undefined'){
                            parent_window.submitUnclosed(null,null,true);
                        } 
                    }
                }
                return true;
            }
        }
        return false;
    },
